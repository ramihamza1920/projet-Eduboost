<div class="login-page">

  <div class="login-box">

    <h2 class="title">Have an account?</h2>

    <form (ngSubmit)="onLogin()">

      <!-- Email -->
      <div class="input-group">
        <div class="input-icon-wrap">
          <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <input
            type="email"
            placeholder="Email"
            [(ngModel)]="email"
            name="email"
            required
          />
        </div>
      </div>

      <!-- Password -->
      <div class="input-group">
        <div class="input-icon-wrap">
          <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input
            [type]="showPassword ? 'text' : 'password'"
            placeholder="Password"
            [(ngModel)]="password"
            name="password"
            required
          />
          <button type="button" class="eye-btn" (click)="showPassword=!showPassword" tabindex="-1">
            <svg *ngIf="!showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg *ngIf="showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>

      <!-- Button -->
      <button type="submit" class="login-btn">
        SIGN IN
      </button>

      <!-- Options -->
      <div class="options">
        <label>
          <input type="checkbox"> Remember Me
        </label>

        <a routerLink="/forgot-password">Forgot Password</a>
      </div>

      <!-- Error message -->
      <p *ngIf="message" class="error">
        {{ message }}
      </p>

      <!-- Register Link -->
      <div class="register-link">
        <a routerLink="/register">— Create new account —</a>
      </div>

    </form>

  </div>

</div>
