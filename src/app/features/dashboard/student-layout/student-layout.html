<!-- Toast -->
<div class="s-toast" *ngIf="toast" [ngClass]="'toast-'+toastType">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
    <ng-container *ngIf="toastType==='success'"><polyline points="20 6 9 17 4 12"/></ng-container>
    <ng-container *ngIf="toastType==='info'"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></ng-container>
    <ng-container *ngIf="toastType==='warning'"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></ng-container>
    <ng-container *ngIf="toastType==='danger'"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></ng-container>
  </svg>
  {{ toast }}
</div>

<div class="s-shell">

  <!-- ══ SIDEBAR ══ -->
  <aside class="s-sidebar">
    <!-- Brand -->
    <a class="s-brand" routerLink="/home">
      <div class="s-brand-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
      </div>
      <div class="s-brand-name">Edu<span>Boost</span></div>
    </a>

    <!-- User card -->
    <div class="s-user-card">
      <div class="s-av">{{ userAvatar }}</div>
      <div>
        <div class="s-user-name">{{ userName }}</div>
        <div class="s-user-role">Student</div>
      </div>
    </div>

    <!-- Nav -->
    <nav class="s-nav">
      <div class="s-nav-label">Main</div>

      <button class="s-nav-item" [class.active]="isActive('home')" (click)="navigate('home')">
        <span class="s-nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
        <span>Dashboard</span>
      </button>

      <button class="s-nav-item" [class.active]="isActive('courses')" (click)="navigate('courses')">
        <span class="s-nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></span>
        <span>My Courses</span>
        <span class="s-nav-badge">{{ totalCourses }}</span>
      </button>

      <button class="s-nav-item" [class.active]="isActive('progress')" (click)="navigate('progress')">
        <span class="s-nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span>
        <span>My Progress</span>
      </button>

      <div class="s-nav-label">Explore</div>

      <button class="s-nav-item" [class.active]="isActive('catalog')" (click)="navigate('catalog')">
        <span class="s-nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
        <span>Catalog</span>
      </button>

      <button class="s-nav-item" [class.active]="isActive('chatbot')" (click)="navigate('chatbot')">
        <span class="s-nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span>
        <span>AI Assistant</span>
      </button>

      <div class="s-nav-label">Account</div>

      <button class="s-nav-item" [class.active]="isActive('profile')" (click)="navigate('profile')">
        <span class="s-nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
        <span>My Profile</span>
      </button>

      <button class="s-nav-item" [class.active]="isActive('settings')" (click)="navigate('settings')">
        <span class="s-nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span>
        <span>Settings</span>
      </button>

      <button class="s-nav-item s-nav-logout" (click)="logout()">
        <span class="s-nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></span>
        <span>Sign Out</span>
      </button>
    </nav>

    <div class="s-sidebar-foot">
      <div class="s-version">EduBoost v2.0 · Student Portal</div>
    </div>
  </aside>

  <!-- ══ MAIN ══ -->
  <div class="s-main">

    <!-- Topbar -->
    <header class="s-topbar">
      <div class="s-topbar-left">
        <div>
          <div class="s-page-title">{{ pageTitle }}</div>
          <div class="s-page-sub">{{ pageSubtitle }}</div>
        </div>
      </div>
      <div class="s-topbar-right">

        <!-- Search -->
        <div class="s-search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input placeholder="Search courses..." [(ngModel)]="searchQuery" (keyup.enter)="doSearch()" />
        </div>

        <!-- Notifications -->
        <div class="s-topbar-action" style="position:relative">
          <button class="s-icon-btn" (click)="toggleNotif($event)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span class="s-badge" *ngIf="unreadCount > 0">{{ unreadCount }}</span>
          </button>
          <div class="s-notif-drop" [class.open]="notifOpen" (click)="$event.stopPropagation()">
            <div class="s-drop-header">
              Notifications
              <button class="s-drop-mark" (click)="markAllRead()">Mark all read</button>
            </div>
            <div class="s-notif-list">
              <div *ngFor="let n of notifications" class="s-notif-item">
                <div class="s-ni-icon" [ngClass]="'ni-'+n.color">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                </div>
                <div style="flex:1">
                  <div class="s-notif-txt">{{ n.text }}</div>
                  <div class="s-notif-time">{{ n.time }}</div>
                </div>
                <div class="s-unread-dot" *ngIf="!n.read"></div>
              </div>
              <div class="s-notif-empty" *ngIf="!notifications.length">No notifications</div>
            </div>
          </div>
        </div>

        <!-- Profile -->
        <button class="s-profile-btn" (click)="navigate('profile')">
          <div class="s-pav">{{ userAvatar }}</div>
          <span class="s-pname">{{ userName.split(' ')[0] }}</span>
          <svg class="s-pchev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
      </div>
    </header>

    <!-- Page content -->
    <div class="s-content">
      <router-outlet></router-outlet>
    </div>

  </div>
</div>
